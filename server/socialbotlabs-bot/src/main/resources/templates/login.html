<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Tutorial</title>
  <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-beta/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-/Y6pD6FV/Vv2HJnA6t+vslU6fwYXjCFtcEpHbNJ0lyAFsXTsjBbfaDjzALeQsN6M" crossorigin="anonymous">
  <link href="https://getbootstrap.com/docs/4.0/examples/signin/signin.css" rel="stylesheet" crossorigin="anonymous"/>
</head>
<body>
<div class="container">
  <form class="form-signin" method="post" th:action="@{/login}">
    <div th:if="${param.error}" class="alert alert-danger" role="alert">
      Credenciales erróneas
    </div>
    <div th:if="${param.logout}" class="alert alert-success" role="alert">
      Has cerrado sesión.
    </div>
    <h2 class="form-signin-heading">Sign In</h2>
    <p>
      <label for="username" class="sr-only">Nombre de Usuario</label>
      <input type="text" id="username" name="username" class="form-control" placeholder="Username" required autofocus>
    </p>
    <p>
      <label for="password" class="sr-only">Contraseña</label>
      <input type="password" id="password" name="password" class="form-control" placeholder="Password" required>
    </p>
    <button class="btn btn-lg btn-primary btn-block" type="submit">Iniciar Sesión</button>
    <a class="btn btn-light btn-block bg-white" href="/authorization-server/oauth2/authorization/google-idp" role="link" style="text-transform: none;">
      <img width="20" style="margin-right: 5px;" alt="Sign in with Google" src="https://foroalfa.org/imagenes/ilustraciones/hd/1204.webp" />
      Sign in with Google
    </a>
    <a class="btn btn-light btn-block bg-white" href="/authorization-server/oauth2/authorization/github-idp" role="link" style="text-transform: none;">
      <img width="20" style="margin-right: 5px;" alt="Sign in with Google" src="https://cdn.prod.website-files.com/5f5a53e153805db840dae2db/64e79ca5aff2fb7295bfddf9_github-que-es.jpg" />
      Sign in with Github
    </a>
  </form>
</div>
</body>
</html>
